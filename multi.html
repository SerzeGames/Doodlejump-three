});
document.getElementById('btnSkinSave').addEventListener('click', () => {
  applySkin(skinPreviewIdx);
  showScreen('lobbyScreen');
});
document.getElementById('btnSkinCancel').addEventListener('click', () => {
  applySkin(skinBeforeEdit);
  showScreen('lobbyScreen');
});
document.getElementById('btnSkinBack').addEventListener('click', () => {
  showScreen('lobbyScreen');
});

document.getElementById('btnPlayAgain').addEventListener('click', () => {
  tryEnableGyro();
  const maxOpPts = Math.max(0, ...conns.map(p=>p.pts));
  if(myPoints >= MAX_POINTS || maxOpPts >= MAX_POINTS) {
    myPoints = 0;
    for(const p of conns) p.pts = 0;
  }
  meReadyForNext = true;
  sendData({ type:'nextReady' });
  document.getElementById('btnPlayAgain').textContent = 'En attente...';
  document.getElementById('btnPlayAgain').disabled = true;
  updateReadyStatus();
  if(allOpponentsReady()) startNextRound();
});

function updateReadyStatus() {
  const el = document.getElementById('readyStatus');
  const parts = [];
  if(meReadyForNext) parts.push(myPseudo + ' est prêt !');
  for(const p of conns) { if(p.readyForNext) parts.push(p.pseudo + ' est prêt !'); }
  el.textContent = parts.join('  ·  ');
}

function startNextRound() {
  meReadyForNext = false;
  for(const p of conns) p.readyForNext = false;
  document.getElementById('btnPlayAgain').disabled = false;
  document.getElementById('readyStatus').textContent = '';
  const anyConnected = conns.some(p => p.conn && p.conn.open);
  if(anyConnected) {
    if(isHost) {
      gameSeed = Date.now();
      sendData({ type:'restart', seed: gameSeed });
      startCountdown();
    }
  } else {
    connected = false;
    showScreen('lobbyScreen');
    lobbyActive = true; lobbyLastTs = 0; requestAnimationFrame(lobbyLoop);
    document.getElementById('btnSearch').disabled = false;
    document.getElementById('lobbyStatus').textContent = '';
    myPoints = 0;
  }
}
document.getElementById('btnBackMenu').addEventListener('click', () => {
  sendData({ type:'quit', pseudo: myPseudo });
  setTimeout(() => {
    for(const p of conns) { if(p.conn) try{p.conn.close();}catch(e){} }
    if(peer) try{peer.destroy();}catch(e){}
    location.href = 'index.html';
  }, 300);
});

// ── Chat system ──
document.getElementById('chatToggle').addEventListener('click', () => {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chatPanel');
  panel.style.display = chatOpen ? 'flex' : 'none';
  if(chatOpen) {
    document.getElementById('chatInput').focus();
    document.getElementById('chatBadge').style.display = 'none';
  }
});

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  appendChatMessage(myPseudo, msg, true);
  sendData({ type:'chat', pseudo: myPseudo, msg: msg });
}

function appendChatMessage(name, msg, isMe) {
  const div = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.style.marginBottom = '6px';
  el.style.wordBreak = 'break-word';
  const nameSpan = document.createElement('span');
  nameSpan.style.fontWeight = '700';
  nameSpan.style.color = isMe ? '#388e3c' : '#42a5f5';
  nameSpan.textContent = name + ' : ';
  const msgSpan = document.createElement('span');
  msgSpan.textContent = msg;
  el.appendChild(nameSpan);
  el.appendChild(msgSpan);
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

document.getElementById('chatSend').addEventListener('click', sendChatMessage);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') { e.preventDefault(); sendChatMessage(); }
});

window.focus();

// ══════════════════════════════════════════
// LOBBY SCENE (rendered on canvas)
// ══════════════════════════════════════════
let lobbyActive = true;
let lobbyDoodlerY = H - 120;
let lobbyDoodlerVy = 0;
const LOBBY_PLAT_Y = H - 55;
const LOBBY_PLAT_X = 40;
const LOBBY_PLAT_W = 80;
let lobbyTime = 0;
let lobbyLastTs = 0;

// Decorative monsters positions
const lobbyDecos = [
  { img:'monsterImg', x:320, y:120, w:50, h:30 },
  { img:'soucoupeImg', x:280, y:40, w:90, h:55 },
  { img:'holeImg', x:330, y:350, w:50, h:50 },
  { img:'monsterImg', x:40, y:250, w:35, h:22 },
];

function lobbyLoop(ts) {
  if(!lobbyActive) return;
  if(!lobbyLastTs) lobbyLastTs = ts;
  const dt = Math.min(ts - lobbyLastTs, 33.33);
  lobbyLastTs = ts;
  const t = dt / 16.667;
  lobbyTime += t;

  // Physics matching in-game exactly
  lobbyDoodlerVy += GRAVITY * t;
  lobbyDoodlerY += lobbyDoodlerVy * t;
  // Land on platform
  if(lobbyDoodlerVy > 0 && lobbyDoodlerY + PLAYER_H >= LOBBY_PLAT_Y) {
    lobbyDoodlerY = LOBBY_PLAT_Y - PLAYER_H;
    lobbyDoodlerVy = JUMP_VEL;
    try { playJump(); } catch(e){}
  }

  // Draw
  ctx.save();

  // Background
  if(bgPattern) {
    ctx.fillStyle = bgPattern;
    ctx.fillRect(0, 0, W, H);
  } else if(bgImg.complete && bgImg.naturalWidth) {
    // Try to create pattern now
    const pc = document.createElement('canvas');
    pc.width = bgImg.naturalWidth; pc.height = bgImg.naturalHeight;
    pc.getContext('2d').drawImage(bgImg, 0, 0);
    bgPattern = ctx.createPattern(pc, 'repeat');
    ctx.fillStyle = bgPattern;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);
  }

  // Decorative monsters
  for(const d of lobbyDecos) {
    const img = d.img === 'monsterImg' ? monsterImg : d.img === 'soucoupeImg' ? soucoupeImg : holeImg;
    if(img.complete && img.naturalWidth) {
      ctx.globalAlpha = 0.5;
      const floatY = Math.sin(lobbyTime * 0.03 + d.x) * 5;
      ctx.drawImage(img, d.x, d.y + floatY, d.w, d.h);
    }
  }
  ctx.globalAlpha = 1;

  // Platform
  if(greenPlatImg.complete && greenPlatImg.naturalWidth) {
    ctx.drawImage(greenPlatImg, LOBBY_PLAT_X, LOBBY_PLAT_Y, LOBBY_PLAT_W, 14);
  }

  // Doodler
  if(playerImg.complete && playerImg.naturalWidth) {
    ctx.save();
    const cx = LOBBY_PLAT_X + LOBBY_PLAT_W/2;
    const cy = lobbyDoodlerY + PLAYER_H/2;
    ctx.translate(cx, cy);
    // Squash-stretch
    let sq = 1;
    if(lobbyDoodlerVy < -2) sq = Math.max(0.85, 1 + lobbyDoodlerVy * 0.01);
    else if(lobbyDoodlerVy > 2) sq = Math.min(1.15, 1 + lobbyDoodlerVy * 0.008);
    ctx.scale(2 - sq, sq);
    ctx.drawImage(playerImg, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
    ctx.restore();
  }

  ctx.restore();
  requestAnimationFrame(lobbyLoop);
}

// Start lobby scene
requestAnimationFrame(lobbyLoop);

// Init audio on first user interaction (so lobby jump sounds work)
document.addEventListener('click', function initOnce() {
  initAudio();
  document.removeEventListener('click', initOnce);
}, { once: true });
document.addEventListener('touchstart', function initOnce2() {
  initAudio();
  document.removeEventListener('touchstart', initOnce2);
}, { once: true });
